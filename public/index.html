<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CODEBOX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c0f;
      --panel: #0f1318;
      --border: #1e2d1e;
      --green: #00ff6a;
      --green-dim: #00a844;
      --green-glow: rgba(0,255,106,0.15);
      --red: #ff3c3c;
      --red-glow: rgba(255,60,60,0.15);
      --amber: #ffb800;
      --text: #c8ffd4;
      --muted: #3a5c3a;
      --font-display: 'Orbitron', monospace;
      --font-mono: 'Share Tech Mono', monospace;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      overflow: hidden;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.15) 2px,
        rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Grid background */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,106,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,106,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 10;
      width: 420px;
      max-width: 95vw;
    }

    /* Corner brackets */
    .bracket {
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: var(--green-dim);
      border-style: solid;
    }
    .bracket.tl { top: -8px; left: -8px; border-width: 2px 0 0 2px; }
    .bracket.tr { top: -8px; right: -8px; border-width: 2px 2px 0 0; }
    .bracket.bl { bottom: -8px; left: -8px; border-width: 0 0 2px 2px; }
    .bracket.br { bottom: -8px; right: -8px; border-width: 0 2px 2px 0; }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 40px 36px 36px;
      position: relative;
    }

    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 11px;
      letter-spacing: 0.4em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* Status display */
    .status-display {
      background: #050705;
      border: 1px solid var(--border);
      border-top: 2px solid var(--green-dim);
      padding: 28px 20px;
      text-align: center;
      margin-bottom: 32px;
      position: relative;
      min-height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .status-display::before {
      content: 'STATUS';
      position: absolute;
      top: -10px;
      left: 16px;
      font-size: 9px;
      letter-spacing: 0.3em;
      color: var(--green-dim);
      background: var(--panel);
      padding: 0 8px;
    }

    .status-text {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.08em;
      color: var(--green);
      text-shadow: 0 0 20px var(--green), 0 0 40px rgba(0,255,106,0.4);
      transition: all 0.3s ease;
      word-break: break-word;
    }

    .status-text.nope {
      color: var(--red);
      text-shadow: 0 0 20px var(--red), 0 0 40px rgba(255,60,60,0.4);
    }

    .status-text.win {
      animation: pulse-win 1.2s ease-in-out infinite;
    }

    @keyframes pulse-win {
      0%, 100% { text-shadow: 0 0 20px var(--green), 0 0 40px rgba(0,255,106,0.4); }
      50% { text-shadow: 0 0 40px var(--green), 0 0 80px rgba(0,255,106,0.7), 0 0 120px rgba(0,255,106,0.3); }
    }

    /* Input section */
    .input-label {
      font-size: 9px;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
      display: block;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .code-input {
      flex: 1;
      background: #050705;
      border: 1px solid var(--border);
      color: var(--green);
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-align: center;
      padding: 12px 8px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      /* Hide arrows */
      -moz-appearance: textfield;
    }
    .code-input::-webkit-outer-spin-button,
    .code-input::-webkit-inner-spin-button { -webkit-appearance: none; }

    .code-input:focus {
      border-color: var(--green-dim);
      box-shadow: 0 0 12px var(--green-glow), inset 0 0 8px rgba(0,255,106,0.05);
    }

    .code-input::placeholder { color: var(--muted); letter-spacing: 0.2em; }

    .submit-btn {
      background: transparent;
      border: 1px solid var(--green-dim);
      color: var(--green);
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      padding: 12px 18px;
      cursor: pointer;
      transition: all 0.15s ease;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .submit-btn:hover {
      background: var(--green-glow);
      border-color: var(--green);
      box-shadow: 0 0 16px var(--green-glow);
    }

    .submit-btn:active { transform: scale(0.97); }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* API info */
    .api-block {
      border-top: 1px solid var(--border);
      padding-top: 20px;
      margin-top: 8px;
    }

    .api-label {
      font-size: 9px;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
      display: block;
    }

    .api-code {
      background: #050705;
      border: 1px solid var(--border);
      border-left: 2px solid var(--muted);
      padding: 12px 14px;
      font-size: 11px;
      color: #5a8a5a;
      line-height: 1.7;
      overflow-x: auto;
      white-space: pre;
    }

    .api-code .method { color: var(--amber); }
    .api-code .key { color: var(--green-dim); }
    .api-code .val { color: #7ab87a; }

    /* Flash animation */
    @keyframes flash {
      0% { opacity: 1; }
      50% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    .flashing { animation: flash 0.15s ease 3; }

    .attempts {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-align: right;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="bracket tl"></div>
    <div class="bracket tr"></div>
    <div class="bracket bl"></div>
    <div class="bracket br"></div>

    <div class="panel">
      <div class="header">
        <div class="logo">SECURE TERMINAL // v1.0</div>
      </div>

      <div class="status-display">
        <div class="status-text" id="statusText">WAITING FOR CODE</div>
      </div>

      <span class="input-label">Enter 4-Digit Code</span>
      <div class="input-row">
        <input
          type="text"
          class="code-input"
          id="codeInput"
          maxlength="4"
          placeholder="0000"
          autocomplete="off"
          inputmode="numeric"
          pattern="\d{4}"
        />
        <button class="submit-btn" id="submitBtn" onclick="submitCode()">SUBMIT</button>
      </div>
      <div class="attempts" id="attemptsText"></div>

      <div class="api-block">
        <span class="api-label">API Endpoint</span>
        <div class="api-code"><span class="method">POST</span> /check
Content-Type: application/json

{ <span class="key">"code"</span>: <span class="val">"1234"</span> }

→ { <span class="key">"result"</span>: <span class="val">"win"</span> | <span class="val">"nope"</span> }</div>
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById('codeInput');
    const statusText = document.getElementById('statusText');
    const submitBtn = document.getElementById('submitBtn');
    const attemptsEl = document.getElementById('attemptsText');
    let attempts = 0;

    // Only allow digits
    input.addEventListener('input', () => {
      input.value = input.value.replace(/\D/g, '').slice(0, 4);
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitCode();
    });

    async function submitCode() {
      const code = input.value.trim();
      if (!/^\d{4}$/.test(code)) {
        flash();
        return;
      }

      submitBtn.disabled = true;
      input.disabled = true;

      try {
        const res = await fetch('/check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code })
        });
        const data = await res.json();

        attempts++;
        attemptsEl.textContent = `ATTEMPTS: ${attempts}`;

        if (data.result === 'win') {
          setStatus('YOU WIN!', 'win');
          submitBtn.disabled = true;
          input.disabled = true;
          return; // keep locked on win
        } else {
          setStatus('NOPE', 'nope');
          setTimeout(() => {
            setStatus('WAITING FOR CODE', '');
            input.value = '';
            input.disabled = false;
            submitBtn.disabled = false;
            input.focus();
          }, 1800);
        }
      } catch (err) {
        setStatus('ERROR', 'nope');
        setTimeout(() => {
          setStatus('WAITING FOR CODE', '');
          input.disabled = false;
          submitBtn.disabled = false;
        }, 1800);
      }
    }

    function setStatus(text, cls) {
      statusText.className = 'status-text ' + cls;
      statusText.textContent = text;
    }

    function flash() {
      statusText.classList.add('flashing');
      setTimeout(() => statusText.classList.remove('flashing'), 500);
    }
  </script>
</body>
</html>
