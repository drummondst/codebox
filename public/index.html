<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CODEBOX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c0f;
      --panel: #0f1318;
      --border: #1e2d1e;
      --green: #00ff6a;
      --green-dim: #00a844;
      --green-glow: rgba(0,255,106,0.15);
      --red: #ff3c3c;
      --red-glow: rgba(255,60,60,0.15);
      --amber: #ffb800;
      --text: #c8ffd4;
      --muted: #3a5c3a;
      --font-display: 'Orbitron', monospace;
      --font-mono: 'Share Tech Mono', monospace;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      overflow: hidden;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.15) 2px,
        rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Grid background */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,106,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,106,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 10;
      width: 420px;
      max-width: 95vw;
    }

    /* Corner brackets */
    .bracket {
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: var(--green-dim);
      border-style: solid;
    }
    .bracket.tl { top: -8px; left: -8px; border-width: 2px 0 0 2px; }
    .bracket.tr { top: -8px; right: -8px; border-width: 2px 2px 0 0; }
    .bracket.bl { bottom: -8px; left: -8px; border-width: 0 0 2px 2px; }
    .bracket.br { bottom: -8px; right: -8px; border-width: 0 2px 2px 0; }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 40px 36px 36px;
      position: relative;
    }

    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 11px;
      letter-spacing: 0.4em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* Status display */
    .status-display {
      background: #050705;
      border: 1px solid var(--border);
      border-top: 2px solid var(--green-dim);
      padding: 28px 20px;
      text-align: center;
      margin-bottom: 32px;
      position: relative;
      min-height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .status-display::before {
      content: 'STATUS';
      position: absolute;
      top: -10px;
      left: 16px;
      font-size: 9px;
      letter-spacing: 0.3em;
      color: var(--green-dim);
      background: var(--panel);
      padding: 0 8px;
    }

    .status-text {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.08em;
      color: var(--green);
      text-shadow: 0 0 20px var(--green), 0 0 40px rgba(0,255,106,0.4);
      transition: all 0.3s ease;
      word-break: break-word;
    }

    .status-text.nope {
      color: var(--red);
      text-shadow: 0 0 20px var(--red), 0 0 40px rgba(255,60,60,0.4);
    }

    .status-text.win {
      animation: pulse-win 1.2s ease-in-out infinite;
    }

    @keyframes pulse-win {
      0%, 100% { text-shadow: 0 0 20px var(--green), 0 0 40px rgba(0,255,106,0.4); }
      50% { text-shadow: 0 0 40px var(--green), 0 0 80px rgba(0,255,106,0.7), 0 0 120px rgba(0,255,106,0.3); }
    }

    @keyframes win-flash {
      0%   { background: var(--panel); }
      20%  { background: rgba(0,255,106,0.18); }
      40%  { background: var(--panel); }
      60%  { background: rgba(0,255,106,0.18); }
      80%  { background: var(--panel); }
      100% { background: rgba(0,255,106,0.07); }
    }

    .panel.win-flash {
      animation: win-flash 0.8s ease forwards;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="bracket tl"></div>
    <div class="bracket tr"></div>
    <div class="bracket bl"></div>
    <div class="bracket br"></div>

    <div class="panel">
      <div class="header">
        <div class="logo">SECURE TERMINAL // v1.0</div>
      </div>

      <div class="status-display">
        <div class="status-text" id="statusText">WAITING FOR CODE</div>
      </div>
    </div>
  </div>

  <script>
    const statusText = document.getElementById('statusText');
    const panel = document.querySelector('.panel');

    // Listen for server-sent events so the page updates instantly when /check is hit
    const evtSource = new EventSource('/events');

    evtSource.addEventListener('win', () => {
      setStatus('YOU WIN!', 'win');
      panel.classList.remove('win-flash');
      void panel.offsetWidth; // reflow to retrigger
      panel.classList.add('win-flash');
    });

    evtSource.addEventListener('nope', () => {
      setStatus('NOPE', 'nope');
      setTimeout(() => setStatus('WAITING FOR CODE', ''), 2000);
    });

    function setStatus(text, cls) {
      statusText.className = 'status-text ' + (cls || '');
      statusText.textContent = text;
    }
  </script>
</body>
</html>
