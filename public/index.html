<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CODEBOX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c0f;
      --panel: #0f1318;
      --border: #1e2d1e;
      --green: #00ff6a;
      --green-dim: #00a844;
      --green-glow: rgba(0,255,106,0.15);
      --red: #ff3c3c;
      --amber: #ffb800;
      --muted: #3a5c3a;
      --font-display: 'Orbitron', monospace;
      --font-mono: 'Share Tech Mono', monospace;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
      pointer-events: none;
      z-index: 100;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(0,255,106,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,106,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* SCREENS */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease, transform 0.5s ease;
      z-index: 10;
    }

    .screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.97);
    }

    /* READY SCREEN */
    #readyScreen { gap: 48px; }

    .ready-label {
      font-family: var(--font-display);
      font-size: clamp(52px, 12vw, 96px);
      font-weight: 900;
      color: var(--green);
      letter-spacing: 0.12em;
      text-shadow: 0 0 30px var(--green), 0 0 60px rgba(0,255,106,0.4);
      animation: breathe 2.5s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { text-shadow: 0 0 30px var(--green), 0 0 60px rgba(0,255,106,0.3); }
      50%       { text-shadow: 0 0 60px var(--green), 0 0 110px rgba(0,255,106,0.6), 0 0 160px rgba(0,255,106,0.2); }
    }

    .start-btn {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.4em;
      color: var(--green);
      background: transparent;
      border: 2px solid var(--green-dim);
      padding: 18px 56px;
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
      outline: none;
    }

    .start-btn::before, .start-btn::after {
      content: '';
      position: absolute;
      width: 10px; height: 10px;
      border-color: var(--green);
      border-style: solid;
      transition: all 0.2s ease;
    }
    .start-btn::before { top: -4px; left: -4px; border-width: 2px 0 0 2px; }
    .start-btn::after  { bottom: -4px; right: -4px; border-width: 0 2px 2px 0; }

    .start-btn:hover {
      background: var(--green-glow);
      border-color: var(--green);
      box-shadow: 0 0 28px var(--green-glow);
    }
    .start-btn:hover::before { top: -8px; left: -8px; }
    .start-btn:hover::after  { bottom: -8px; right: -8px; }
    .start-btn:active { transform: scale(0.97); }

    /* GAME SCREEN */
    #gameScreen { gap: 32px; }

    .countdown-wrap { text-align: center; }

    .countdown-label {
      font-size: 20px;
      letter-spacing: 0.4em;
      color: var(--green);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .countdown {
      font-family: var(--font-display);
      font-size: clamp(80px, 18vw, 160px);
      font-weight: 900;
      color: var(--amber);
      letter-spacing: 0.06em;
      text-shadow: 0 0 30px var(--amber), 0 0 60px rgba(255,184,0,0.35);
      line-height: 1;
      transition: color 0.5s, text-shadow 0.5s;
    }

    .countdown.warning {
      color: var(--amber);
      text-shadow: 0 0 30px var(--amber), 0 0 60px rgba(255,184,0,0.35);
    }

    .countdown.red {
      color: var(--red);
      text-shadow: 0 0 30px var(--red), 0 0 60px rgba(255,60,60,0.35);
    }

    .countdown.danger {
      color: var(--red);
      text-shadow: 0 0 30px var(--red), 0 0 60px rgba(255,60,60,0.35);
      animation: blink 1s step-end infinite;
    }

    .countdown.won {
      color: var(--green);
      text-shadow: 0 0 30px var(--green), 0 0 60px rgba(0,255,106,0.5);
      animation: none;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.45; }
    }

    /* TERMINAL PANEL */
    .container {
      position: relative;
      width: 420px;
      max-width: 92vw;
    }

    .bracket {
      position: absolute;
      width: 20px; height: 20px;
      border-color: var(--green-dim);
      border-style: solid;
    }
    .bracket.tl { top: -8px; left: -8px; border-width: 2px 0 0 2px; }
    .bracket.tr { top: -8px; right: -8px; border-width: 2px 2px 0 0; }
    .bracket.bl { bottom: -8px; left: -8px; border-width: 0 0 2px 2px; }
    .bracket.br { bottom: -8px; right: -8px; border-width: 0 2px 2px 0; }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 36px 36px 36px;
      position: relative;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 11px;
      letter-spacing: 0.4em;
      color: var(--muted);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 32px;
    }

    .status-display {
      background: #050705;
      border: 1px solid var(--border);
      border-top: 2px solid var(--green-dim);
      padding: 28px 20px;
      text-align: center;
      position: relative;
      min-height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .status-display::before {
      content: 'STATUS';
      position: absolute;
      top: -10px; left: 16px;
      font-size: 9px;
      letter-spacing: 0.3em;
      color: var(--green-dim);
      background: var(--panel);
      padding: 0 8px;
    }

    .status-text {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.08em;
      color: var(--green);
      text-shadow: 0 0 20px var(--green), 0 0 40px rgba(0,255,106,0.4);
      transition: all 0.3s ease;
    }

    .status-text.nope {
      color: var(--red);
      text-shadow: 0 0 20px var(--red), 0 0 40px rgba(255,60,60,0.4);
    }

    .status-text.win {
      animation: pulse-win 1.2s ease-in-out infinite;
    }

    @keyframes pulse-win {
      0%, 100% { text-shadow: 0 0 20px var(--green), 0 0 40px rgba(0,255,106,0.4); }
      50%       { text-shadow: 0 0 40px var(--green), 0 0 80px rgba(0,255,106,0.7), 0 0 120px rgba(0,255,106,0.3); }
    }

    @keyframes win-flash {
      0%   { background: var(--panel); }
      20%  { background: rgba(0,255,106,0.18); }
      40%  { background: var(--panel); }
      60%  { background: rgba(0,255,106,0.18); }
      80%  { background: var(--panel); }
      100% { background: rgba(0,255,106,0.07); }
    }

    .panel.win-flash { animation: win-flash 0.8s ease forwards; }
  </style>
</head>
<body>

  <!-- SCREEN 1: Ready -->
  <div class="screen" id="readyScreen">
    <div class="ready-label">READY?</div>
    <button class="start-btn" onclick="startGame()">START</button>
  </div>

  <!-- SCREEN 2: Game -->
  <div class="screen hidden" id="gameScreen">
    <div class="countdown-wrap">
      <div class="countdown-label">TIME REMAINING</div>
      <div class="countdown" id="countdown">1:00:00</div>
    </div>

    <div class="container">
      <div class="bracket tl"></div>
      <div class="bracket tr"></div>
      <div class="bracket bl"></div>
      <div class="bracket br"></div>
      <div class="panel" id="panel">
        <div class="logo">SECURE TERMINAL // v1.0</div>
        <div class="status-display">
          <div class="status-text" id="statusText">WAITING FOR CODE</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const statusText = document.getElementById('statusText');
    const panel      = document.getElementById('panel');
    const countdownEl = document.getElementById('countdown');

    let timerInterval = null;
    let secondsLeft   = 3600;

    // ── FIREWORKS ──────────────────────────────────────────────────────────
    let fwCanvas, fwCtx, fwParticles = [], fwAnimId = null;

    function launchFireworks() {
      if (fwCanvas) fwCanvas.remove();
      fwCanvas = document.createElement('canvas');
      fwCanvas.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:200;';
      document.body.appendChild(fwCanvas);
      fwCtx = fwCanvas.getContext('2d');
      resizeFW();
      window.addEventListener('resize', resizeFW);
      fwParticles = [];
      let bursts = 0;
      const maxBursts = 360;
      function scheduleBurst() {
        if (bursts >= maxBursts) return;
        burst();
        bursts++;
        setTimeout(scheduleBurst, 300 + Math.random() * 400);
      }
      scheduleBurst();
      animateFW();
      // Stop after 10s
      setTimeout(stopFireworks, 300000);
    }

    function resizeFW() {
      if (!fwCanvas) return;
      fwCanvas.width  = window.innerWidth;
      fwCanvas.height = window.innerHeight;
    }

    function burst() {
      const x = fwCanvas.width  * (0.1 + Math.random() * 0.8);
      const y = fwCanvas.height * (0.1 + Math.random() * 0.55);
      const colors = ['#00ff6a','#00ffcc','#ffb800','#ff3c3c','#ffffff','#00cfff','#ff69f0'];
      const color  = colors[Math.floor(Math.random() * colors.length)];
      const count  = 60 + Math.floor(Math.random() * 40);
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 / count) * i + Math.random() * 0.3;
        const speed = 2 + Math.random() * 5;
        fwParticles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          alpha: 1,
          decay: 0.012 + Math.random() * 0.012,
          radius: 2 + Math.random() * 2,
          color,
          trail: [],
        });
      }
    }

    function animateFW() {
      fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
      for (let i = fwParticles.length - 1; i >= 0; i--) {
        const p = fwParticles[i];
        p.trail.push({ x: p.x, y: p.y, alpha: p.alpha });
        if (p.trail.length > 8) p.trail.shift();

        // Draw trail
        for (let t = 0; t < p.trail.length; t++) {
          const tr = p.trail[t];
          fwCtx.beginPath();
          fwCtx.arc(tr.x, tr.y, p.radius * (t / p.trail.length) * 0.8, 0, Math.PI * 2);
          fwCtx.fillStyle = p.color;
          fwCtx.globalAlpha = tr.alpha * (t / p.trail.length) * 0.4;
          fwCtx.fill();
        }

        // Draw particle
        fwCtx.beginPath();
        fwCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        fwCtx.fillStyle = p.color;
        fwCtx.globalAlpha = p.alpha;
        fwCtx.fill();

        fwCtx.globalAlpha = 1;
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.08; // gravity
        p.vx *= 0.98;
        p.alpha -= p.decay;
        if (p.alpha <= 0) fwParticles.splice(i, 1);
      }
      fwAnimId = requestAnimationFrame(animateFW);
    }

    function stopFireworks() {
      if (fwAnimId) { cancelAnimationFrame(fwAnimId); fwAnimId = null; }
      if (fwCanvas) { fwCanvas.remove(); fwCanvas = null; }
      fwParticles = [];
    }
    // ──────────────────────────────────────────────────────────────────────

    function startGame() {
      document.getElementById('readyScreen').classList.add('hidden');
      document.getElementById('gameScreen').classList.remove('hidden');
      connectSSE();
      renderCountdown();
      startTimer();
    }

    function renderCountdown() {
      const h = Math.floor(secondsLeft / 3600);
      const m = Math.floor((secondsLeft % 3600) / 60);
      const s = secondsLeft % 60;
      countdownEl.textContent = `${h}:${pad(m)}:${pad(s)}`;
      if      (secondsLeft <= 0)   countdownEl.className = 'countdown danger';
      else if (secondsLeft <= 300) countdownEl.className = 'countdown danger';
      else if (secondsLeft <= 600) countdownEl.className = 'countdown red';
      else                         countdownEl.className = 'countdown warning';
    }

    function startTimer() {
      timerInterval = setInterval(() => {
        if (secondsLeft > 0) {
          secondsLeft--;
          renderCountdown();
        } else {
          clearInterval(timerInterval);
          setStatus('YOU FAILED', 'nope');
        }
      }, 1000);
    }

    function pad(n) { return String(n).padStart(2, '0'); }

    function connectSSE() {
      const evtSource = new EventSource('/events');

      evtSource.addEventListener('win', () => {
        clearInterval(timerInterval);
        countdownEl.className = 'countdown won';
        setStatus('YOU WIN!', 'win');
        panel.classList.remove('win-flash');
        void panel.offsetWidth;
        panel.classList.add('win-flash');
        launchFireworks();
        const audio = new Audio('/song.mp3');
        audio.play().catch(() => {}); // catch autoplay block silently
      });

      evtSource.addEventListener('nope', () => {
        setStatus('NOPE', 'nope');
        setTimeout(() => setStatus('WAITING FOR CODE', ''), 2000);
      });

      evtSource.addEventListener('timer-restart', () => {
        resetTimer(3600);
      });

      evtSource.addEventListener('timer-set', (e) => {
        const data = JSON.parse(e.data);
        resetTimer(data.seconds);
      });
    }

    function resetTimer(secs) {
      clearInterval(timerInterval);
      stopFireworks();
      secondsLeft = secs;
      renderCountdown();
      startTimer();
      setStatus('WAITING FOR CODE', '');
    }

    function setStatus(text, cls) {
      statusText.className = 'status-text ' + (cls || '');
      statusText.textContent = text;
    }
  </script>
</body>
</html>
